<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travelling Salesman</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .nav-btn { transition: background 0.15s, color 0.15s; }
    .nav-btn.active { background: #2563eb; color: #fff; }
    .nav-btn:not(.active):hover { background: #f1f5f9; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 font-sans antialiased">

<div class="flex h-screen overflow-hidden">

  <!-- ── Sidebar ── -->
  <aside class="w-52 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 shadow-sm">
    <div class="px-5 py-4 border-b border-gray-100">
      <p class="text-lg font-bold text-gray-900">Travelling Salesman</p>
      <p class="text-[11px] text-gray-400 mt-0.5">Forecasting & Incentives</p>
    </div>
    <nav class="flex-1 px-3 py-3 space-y-0.5" id="nav">
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="dashboard"     onclick="go('dashboard')">📊 Dashboard</button>
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="accounts"      onclick="go('accounts')">🏢 Accounts</button>
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="opportunities" onclick="go('opportunities')">🎯 Opportunities</button>
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="collections"   onclick="go('collections')">💰 Collections</button>
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="incentives"    onclick="go('incentives')">🏆 Incentives</button>
      <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700" data-page="settings"      onclick="go('settings')">⚙️ Settings</button>
    </nav>
    <div class="px-4 py-3 border-t border-gray-100">
      <p class="text-[10px] text-gray-300">FY: Apr – Mar</p>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="flex-1 overflow-y-auto">
    <div id="app" class="p-7 max-w-6xl mx-auto"></div>
  </main>
</div>

<!-- ── Toast ── -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
  <div class="bg-gray-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-xl" id="toast-msg"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const STATUS  = ['Open','Commit','Best Case','Won','Lost'];
const OPEN_ST = ['Open','Commit','Best Case'];
const STATUS_COLOR = {
  Open:'bg-blue-100 text-blue-700', Commit:'bg-violet-100 text-violet-700',
  'Best Case':'bg-amber-100 text-amber-700', Won:'bg-emerald-100 text-emerald-700',
  Lost:'bg-red-100 text-red-700',
};
const TIERS   = ['Enterprise','Mid-Market','SMB'];
const HEALTH  = ['Green','Yellow','Red'];
const RISK    = ['Low','Medium','High'];

// Account field definitions for CSV mapping
const ACC_FIELDS = [
  { key:'account_name',  label:'Account Name',  required:true,  aliases:['account name','account','company','client','customer','organisation','organization'] },
  { key:'am_name',       label:'AM Name',        required:true,  aliases:['am','am name','account manager','account_manager','ae','account executive'] },
  { key:'csm_name',      label:'CSM Name',       required:true,  aliases:['csm','csm name','customer success','csm_name','customer success manager','success manager'] },
  { key:'arr',           label:'ARR (₹)',         required:true,  aliases:['arr','annual recurring revenue','annual revenue','acv','contract value','arr value'] },
  { key:'product',       label:'Product',         required:true,  aliases:['product','products','product name','plan','subscription','package'] },
  { key:'renewal_date',  label:'Renewal Date',    required:true,  aliases:['renewal date','renewal','contract renewal','expiry date','end date','contract end','contract expiry'] },
  { key:'account_tier',  label:'Account Tier',    required:false, aliases:['tier','account tier','segment','account segment','customer tier'] },
  { key:'health_score',  label:'Health Score',    required:false, aliases:['health','health score','account health','health status','nps'] },
  { key:'churn_risk',    label:'Churn Risk',      required:false, aliases:['churn risk','churn','risk','risk level','attrition risk'] },
  { key:'notes',         label:'Notes',           required:false, aliases:['notes','comments','note','remarks','description'] },
];

// ════════════════════════════════════════════════
//  DATA LAYER  (localStorage)
// ════════════════════════════════════════════════
const ls = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};
const opps    = () => ls.get('opps', []);
const cols    = () => ls.get('cols', []);
const cfg     = () => ls.get('cfg', { am_pct:5, csm_pct:3, reps:[] });
const accs    = () => ls.get('accs', []);
const setOpps = v  => ls.set('opps', v);
const setCols = v  => ls.set('cols', v);
const setCfg  = v  => ls.set('cfg', v);
const setAccs = v  => ls.set('accs', v);
const uid     = arr => arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1;

// ════════════════════════════════════════════════
//  FY HELPERS
// ════════════════════════════════════════════════
function fyq(mIdx, yr) {
  const m = mIdx + 1;
  let q, s;
  if (m >= 4) { s = yr;   q = m<=6?'Q1':m<=9?'Q2':'Q3'; }
  else        { s = yr-1; q = 'Q4'; }
  return { q, fy: `FY${s}-${String(s+1).slice(2)}` };
}
function nowFy() { const n=new Date(); return fyq(n.getMonth(), n.getFullYear()).fy; }
const inr = n => '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits:0});

// Account enrichment (computed fields)
function enrichAcc(a) {
  const arr = Number(a.arr) || 0;
  const mrr = arr / 12;
  let days = null, renewalStatus = '', renewalQ = '', renewalFy = '';
  if (a.renewal_date) {
    const rd = new Date(a.renewal_date);
    if (!isNaN(rd)) {
      const today = new Date(); today.setHours(0,0,0,0);
      days = Math.round((rd - today) / 86400000);
      if      (days < 0)   renewalStatus = 'Expired';
      else if (days < 30)  renewalStatus = 'Critical';
      else if (days < 90)  renewalStatus = 'Soon';
      else if (days < 180) renewalStatus = 'Upcoming';
      else                  renewalStatus = 'Future';
      const {q, fy} = fyq(rd.getMonth(), rd.getFullYear());
      renewalQ = q; renewalFy = fy;
    }
  }
  return { ...a, arr, mrr, days, renewalStatus, renewalQ, renewalFy };
}

// ════════════════════════════════════════════════
//  ROUTER
// ════════════════════════════════════════════════
let page    = 'dashboard';
let charts  = {};
let oppMode = 'list';
let colMode = 'list';
let accMode = 'list';   // list | import | add | edit
let editId  = null;
let accEditId = null;
let csvParsed = null;   // { headers, rows }
let csvMapping = {};

function go(p) {
  page = p; oppMode = 'list'; colMode = 'list'; accMode = 'list';
  Object.values(charts).forEach(c => c.destroy()); charts = {};
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === p);
    if (b.dataset.page !== p) b.classList.add('text-gray-700');
    else b.classList.remove('text-gray-700');
  });
  render();
}

function render() {
  document.getElementById('app').innerHTML = '';
  ({ dashboard, accounts, opportunities, collections, incentives, settings })[page]();
}

// ════════════════════════════════════════════════
//  SHARED COMPONENTS
// ════════════════════════════════════════════════
function card(html, cls='') {
  return `<div class="bg-white rounded-xl border border-gray-200 ${cls}">${html}</div>`;
}
function metric(label, val, sub='') {
  return card(`
    <p class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">${label}</p>
    <p class="text-2xl font-bold text-gray-900 mt-1">${val}</p>
    ${sub ? `<p class="text-xs text-gray-400 mt-0.5">${sub}</p>` : ''}
  `, 'p-5');
}
function badge(s) {
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${STATUS_COLOR[s]||'bg-gray-100 text-gray-500'}">${s}</span>`;
}
function typeBadge(t) {
  const c = t==='AM' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700';
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${c}">${t}</span>`;
}
function healthBadge(h) {
  const c = h==='Green'?'bg-emerald-100 text-emerald-700':h==='Yellow'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
  const dot = h==='Green'?'🟢':h==='Yellow'?'🟡':'🔴';
  return h ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${c}">${dot} ${h}</span>` : '—';
}
function riskBadge(r) {
  const c = r==='Low'?'bg-emerald-100 text-emerald-700':r==='Medium'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
  return r ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${c}">${r}</span>` : '—';
}
function renewalBadge(s) {
  const map = {
    Critical:'bg-red-100 text-red-700', Soon:'bg-amber-100 text-amber-700',
    Upcoming:'bg-blue-100 text-blue-700', Future:'bg-gray-100 text-gray-500',
    Expired:'bg-red-200 text-red-800',
  };
  return s ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[s]||'bg-gray-100 text-gray-500'}">${s}</span>` : '';
}
function tierBadge(t) {
  const c = t==='Enterprise'?'bg-violet-100 text-violet-700':t==='Mid-Market'?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-600';
  return t ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${c}">${t}</span>` : '—';
}
function pageHeader(title, sub, btnHtml='') {
  return `<div class="flex items-start justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">${title}</h1>
      ${sub ? `<p class="text-sm text-gray-400 mt-0.5">${sub}</p>` : ''}
    </div>
    ${btnHtml}
  </div>`;
}
function inp(id, type, val, cls='', extra='') {
  return `<input id="${id}" type="${type}" value="${val}" ${extra} class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${cls}" />`;
}
function sel(id, opts, selVal, cls='') {
  const options = opts.map(o => {
    const v = typeof o==='object' ? o.v : o;
    const l = typeof o==='object' ? o.l : o;
    return `<option value="${v}" ${String(v)===String(selVal)?'selected':''}>${l}</option>`;
  }).join('');
  return `<select id="${id}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${cls}">${options}</select>`;
}
function lbl(text) { return `<label class="block text-xs font-medium text-gray-500 mb-1">${text}</label>`; }
function frow(...fields) {
  return `<div class="grid grid-cols-${fields.length} gap-4">${fields.map(f=>`<div>${f}</div>`).join('')}</div>`;
}
function emptyState(msg) {
  return `<div class="text-center py-16 text-gray-300"><p class="text-4xl mb-3">📭</p><p class="text-sm">${msg}</p></div>`;
}
function thRow(headers) {
  return `<tr>${headers.map(h=>`<th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">${h}</th>`).join('')}</tr>`;
}

// ════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════
function dashboard() {
  const all  = opps();
  const fy   = nowFy();
  const fyo  = all.filter(o => o.fy === fy);
  const openV = fyo.filter(o => OPEN_ST.includes(o.status)).reduce((s,o)=>s+o.value,0);
  const wonV  = fyo.filter(o => o.status==='Won').reduce((s,o)=>s+o.value,0);
  const lostV = fyo.filter(o => o.status==='Lost').reduce((s,o)=>s+o.value,0);

  // Account metrics
  const allAccs   = accs().map(enrichAcc);
  const totalARR  = allAccs.reduce((s,a)=>s+a.arr,0);
  const atRisk    = allAccs.filter(a=>a.churn_risk==='High'||a.renewalStatus==='Critical');
  const upcoming  = allAccs.filter(a=>a.days!==null&&a.days>=0&&a.days<=90).sort((a,b)=>a.days-b.days);

  document.getElementById('app').innerHTML = `
    ${pageHeader('Dashboard', `Pipeline · ${fy}`)}

    ${allAccs.length > 0 ? `
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Account Book</p>
    <div class="grid grid-cols-4 gap-4 mb-6">
      ${metric('Total ARR', inr(totalARR), `${allAccs.length} accounts`)}
      ${metric('Monthly MRR', inr(totalARR/12))}
      ${metric('At-Risk Accounts', atRisk.length, 'High churn or Critical renewal')}
      ${metric('Renewing in 90d', upcoming.length, inr(upcoming.reduce((s,a)=>s+a.arr,0))+' ARR')}
    </div>` : ''}

    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Pipeline</p>
    <div class="grid grid-cols-4 gap-4 mb-5">
      ${metric('Open Pipeline', inr(openV))}
      ${metric('Won', inr(wonV))}
      ${metric('Lost', inr(lostV))}
      ${metric('Total Deals', fyo.length, fy)}
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      ${card('<p class="text-sm font-semibold text-gray-700 mb-3">Pipeline by Quarter & Status</p><canvas id="ch-q" height="210"></canvas>', 'p-5')}
      ${card('<p class="text-sm font-semibold text-gray-700 mb-3">Status Breakdown</p><canvas id="ch-s" height="210"></canvas>', 'p-5')}
    </div>

    ${upcoming.length > 0 ? card(`
      <div class="flex items-center justify-between mb-3">
        <p class="text-sm font-semibold text-gray-700">🔔 Renewals in Next 90 Days</p>
        <button onclick="go('accounts')" class="text-xs text-blue-500 hover:underline">View all →</button>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-100">
          ${thRow(['Account','AM','CSM','ARR','Renewal Date','Days','Status'])}
        </thead>
        <tbody class="divide-y divide-gray-50">
          ${upcoming.slice(0,8).map(a=>`
            <tr class="hover:bg-slate-50">
              <td class="px-4 py-2.5 font-medium">${a.account_name}</td>
              <td class="px-4 py-2.5 text-gray-500 text-xs">${a.am_name}</td>
              <td class="px-4 py-2.5 text-gray-500 text-xs">${a.csm_name}</td>
              <td class="px-4 py-2.5 font-semibold">${inr(a.arr)}</td>
              <td class="px-4 py-2.5 text-gray-500 text-xs">${a.renewal_date}</td>
              <td class="px-4 py-2.5 text-xs font-semibold ${a.days<30?'text-red-600':a.days<90?'text-amber-600':'text-gray-600'}">${a.days}d</td>
              <td class="px-4 py-2.5">${renewalBadge(a.renewalStatus)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    `, 'overflow-hidden mb-4') : ''}

    ${card('<p class="text-sm font-semibold text-gray-700 mb-3">Rep-wise Pipeline (Open + Won)</p><canvas id="ch-r" height="120"></canvas>', 'p-5')}
  `;

  const qs = ['Q1','Q2','Q3','Q4'];
  const sc = { Open:'#3b82f6', Commit:'#8b5cf6', 'Best Case':'#f59e0b', Won:'#10b981', Lost:'#ef4444' };
  const compact = v => '₹'+Number(v).toLocaleString('en-IN',{notation:'compact'});

  charts.q = new Chart(document.getElementById('ch-q'), {
    type: 'bar',
    data: {
      labels: qs,
      datasets: STATUS.map(s => ({
        label: s,
        data: qs.map(q => fyo.filter(o=>o.quarter===q&&o.status===s).reduce((a,o)=>a+o.value,0)),
        backgroundColor: sc[s],
      })),
    },
    options: { responsive:true, plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}}, scales:{x:{grid:{display:false}},y:{ticks:{callback:compact}}} },
  });

  const stTotals = STATUS.map(s => fyo.filter(o=>o.status===s).reduce((a,o)=>a+o.value,0));
  charts.s = new Chart(document.getElementById('ch-s'), {
    type: 'doughnut',
    data: { labels:STATUS, datasets:[{data:stTotals, backgroundColor:Object.values(sc), borderWidth:2}] },
    options: { responsive:true, plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}} },
  });

  const repMap = {};
  fyo.filter(o=>[...OPEN_ST,'Won'].includes(o.status)).forEach(o => { repMap[o.rep_name]=(repMap[o.rep_name]||0)+o.value; });
  charts.r = new Chart(document.getElementById('ch-r'), {
    type: 'bar',
    data: { labels:Object.keys(repMap), datasets:[{label:'Value',data:Object.values(repMap),backgroundColor:'#3b82f6',borderRadius:4}] },
    options: { responsive:true, indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:compact}},y:{grid:{display:false}}} },
  });
}

// ════════════════════════════════════════════════
//  ACCOUNTS
// ════════════════════════════════════════════════
function accounts() {
  document.getElementById('app').innerHTML = `
    ${pageHeader('Accounts','Your account book',
      `<div class="flex gap-2">
        <button onclick="downloadSampleCSV()" class="border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium px-3 py-2 rounded-lg">↓ Sample CSV</button>
        <button onclick="exportAccs()" class="border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium px-3 py-2 rounded-lg">↑ Export</button>
        <button onclick="accMode='import';render()" class="border border-blue-200 text-blue-600 hover:bg-blue-50 text-sm font-medium px-3 py-2 rounded-lg">Import CSV</button>
        <button onclick="accMode='add';render()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg">+ Add Account</button>
      </div>`
    )}
    <div id="acc-body"></div>
  `;
  if      (accMode==='import')              renderAccImport();
  else if (accMode==='add'||accMode==='edit') renderAccForm();
  else                                       renderAccList();
}

// ── List ──────────────────────────────────────────
function renderAccList() {
  const data = accs().map(enrichAcc);
  const ams   = [...new Set(data.map(a=>a.am_name).filter(Boolean))].sort();
  const csms  = [...new Set(data.map(a=>a.csm_name).filter(Boolean))].sort();
  const prods = [...new Set(data.map(a=>a.product).filter(Boolean))].sort();
  const totalARR = data.reduce((s,a)=>s+a.arr,0);

  document.getElementById('acc-body').innerHTML = `
    <div class="grid grid-cols-4 gap-4 mb-5">
      ${metric('Total Accounts', data.length)}
      ${metric('Total ARR', inr(totalARR))}
      ${metric('Total MRR', inr(totalARR/12))}
      ${metric('At Risk', data.filter(a=>a.churn_risk==='High'||a.renewalStatus==='Critical').length, 'High churn or critical renewal')}
    </div>
    <div class="flex flex-wrap gap-2 mb-4">
      ${sel('af-am',   [{v:'',l:'All AMs'},...ams.map(a=>({v:a,l:a}))], '', 'w-auto')}
      ${sel('af-csm',  [{v:'',l:'All CSMs'},...csms.map(c=>({v:c,l:c}))], '', 'w-auto')}
      ${sel('af-prod', [{v:'',l:'All Products'},...prods.map(p=>({v:p,l:p}))], '', 'w-auto')}
      ${sel('af-tier', [{v:'',l:'All Tiers'},...TIERS.map(t=>({v:t,l:t}))], '', 'w-auto')}
      ${sel('af-health',[{v:'',l:'All Health'},...HEALTH.map(h=>({v:h,l:h}))], '', 'w-auto')}
      ${sel('af-risk', [{v:'',l:'All Risk'},...RISK.map(r=>({v:r,l:r}))], '', 'w-auto')}
      ${sel('af-renew',[{v:'',l:'All Renewals'},{v:'30',l:'Next 30d'},{v:'90',l:'Next 90d'},{v:'180',l:'Next 180d'}], '', 'w-auto')}
    </div>
    <div id="acc-tbl"></div>
  `;
  ['af-am','af-csm','af-prod','af-tier','af-health','af-risk','af-renew'].forEach(id => {
    document.getElementById(id).onchange = filterAccs;
  });
  filterAccs();
}

function filterAccs() {
  const am    = document.getElementById('af-am').value;
  const csm   = document.getElementById('af-csm').value;
  const prod  = document.getElementById('af-prod').value;
  const tier  = document.getElementById('af-tier').value;
  const hlth  = document.getElementById('af-health').value;
  const risk  = document.getElementById('af-risk').value;
  const renew = document.getElementById('af-renew').value;
  let data = accs().map(enrichAcc);
  if (am)    data = data.filter(a=>a.am_name===am);
  if (csm)   data = data.filter(a=>a.csm_name===csm);
  if (prod)  data = data.filter(a=>a.product===prod);
  if (tier)  data = data.filter(a=>a.account_tier===tier);
  if (hlth)  data = data.filter(a=>a.health_score===hlth);
  if (risk)  data = data.filter(a=>a.churn_risk===risk);
  if (renew) data = data.filter(a=>a.days!==null&&a.days>=0&&a.days<=parseInt(renew));

  const totalARR = data.reduce((s,a)=>s+a.arr,0);
  document.getElementById('acc-tbl').innerHTML = data.length===0
    ? card(emptyState('No accounts match the filters.'), 'p-0 overflow-hidden')
    : card(`
      <div class="overflow-x-auto">

function handleFileDrop(e) {
  const file = e.dataTransfer.files[0];
  if (file) processCSVFile(file);
}
function handleFileInput(inp) {
  if (inp.files[0]) processCSVFile(inp.files[0]);
}

function processCSVFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);
    if (!parsed.headers.length) { toast('Could not parse CSV — check the file.'); return; }
    csvParsed = parsed;
    csvMapping = autoMapCols(parsed.headers);
    renderMappingUI(file.name, parsed);
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return { headers:[], rows:[] };
  const headers = splitCSVLine(lines[0]);
  const rows = lines.slice(1).filter(l=>l.trim()).map(l => {
    const vals = splitCSVLine(l);
    return headers.reduce((obj,h,i) => { obj[h] = (vals[i]||'').trim(); return obj; }, {});
  });
  return { headers, rows };
}

function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i=0; i<line.length; i++) {
    const ch = line[i];
    if (ch==='"') { inQ=!inQ; }
    else if (ch===','&&!inQ) { result.push(cur.trim()); cur=''; }
    else { cur+=ch; }
  }
  result.push(cur.trim());
  return result.map(v=>v.replace(/^"|"$/g,''));
}

function autoMapCols(headers) {
  const norm = h => h.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
  const mapping = {};
  ACC_FIELDS.forEach(f => {
    const found = headers.find(h => f.aliases.some(a => norm(h)===a || norm(h).includes(a)));
    mapping[f.key] = found || '';
  });
  return mapping;
}

function executeImport() {
  // Read mapping from selects
  const mapping = {};
  ACC_FIELDS.forEach(f => {
    const el = document.getElementById('map-'+f.key);
    if (el) mapping[f.key] = el.value;
  });

  // Validate required fields are mapped
  const missing = ACC_FIELDS.filter(f=>f.required&&!mapping[f.key]).map(f=>f.label);
  if (missing.length) { alert('Please map required fields: ' + missing.join(', ')); return; }

  const existing = accs();
  let added = 0, skipped = 0;
  const imported = csvParsed.rows.map(row => {
    const arrRaw = row[mapping.arr]||'';
    const arr = parseFloat(arrRaw.replace(/[^0-9.]/g,''));
    if (!row[mapping.account_name]) { skipped++; return null; }
    added++;
    return {
      id: uid([...existing, ...csvParsed.rows.slice(0,added).filter(Boolean).map((_,i)=>({id:i}))]),
      account_name:  row[mapping.account_name]  || '',
      am_name:       row[mapping.am_name]        || '',
      csm_name:      row[mapping.csm_name]       || '',
      arr:           isNaN(arr) ? 0 : arr,
      product:       mapping.product  ? row[mapping.product]  || '' : '',
      renewal_date:  mapping.renewal_date ? row[mapping.renewal_date] || '' : '',
      account_tier:  mapping.account_tier  ? row[mapping.account_tier]  || '' : '',
      health_score:  mapping.health_score  ? row[mapping.health_score]  || '' : '',
      churn_risk:    mapping.churn_risk    ? row[mapping.churn_risk]    || '' : '',
      notes:         mapping.notes         ? row[mapping.notes]         || '' : '',
    };
  }).filter(Boolean);

  // Re-assign IDs to avoid collisions
  const maxId = existing.length ? Math.max(...existing.map(a=>a.id)) : 0;
  imported.forEach((a,i) => { a.id = maxId + i + 1; });

  setAccs([...existing, ...imported]);
  csvParsed = null; csvMapping = {};
  toast(`Imported ${added} accounts${skipped?' ('+skipped+' skipped)':''}`);
  accMode='list'; go('accounts');
}

        lbl('Value (₹) *')  + inp('o-val','number', v('value',''))
      )}
      ${frow(
        lbl('Expected Close Month *') + sel('o-month', MONTHS.map((m,i)=>({v:i,l:m})), closeMonthIdx),
        lbl('Expected Close Year *')  + inp('o-year','number', closeYear)
      )}
      ${frow(
        lbl('Status *') + sel('o-status', STATUS, v('status','Open')),
        '<div></div>'
      )}
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="saveOpp(${isEdit?editId:'null'})" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium">
        ${isEdit?'Save Changes':'Add Deal'}
      </button>
      <button onclick="oppMode='list';render()" class="border border-gray-200 text-gray-600 hover:bg-gray-50 px-5 py-2 rounded-lg text-sm">Cancel</button>
    </div>
  `, 'p-6');
}

function saveOpp(eid) {
  const name   = document.getElementById('o-name').value.trim();
  const client = document.getElementById('o-client').value.trim();
  const repEl  = document.getElementById('o-rep');
  const val    = parseFloat(document.getElementById('o-val').value);
  const mIdx   = parseInt(document.getElementById('o-month').value);
  const yr     = parseInt(document.getElementById('o-year').value);
  const st     = document.getElementById('o-status').value;
  if (!name||!client||isNaN(val)||val<0) { alert('Fill in all required fields.'); return; }
  const c = cfg();
  const repName = repEl?.value||'';
  const repType = (c.reps.find(r=>r.name===repName)||{}).type||'AM';
  const {q, fy} = fyq(mIdx, yr);
  let data = opps();
  if (eid!==null) {
    data = data.map(o => o.id===eid ? {...o, opportunity_name:name, client_name:client, rep_name:repName, rep_type:repType, value:val, close_month:MONTHS[mIdx], close_year:yr, quarter:q, fy, status:st} : o);
  } else {
    data.push({ id:uid(data), opportunity_name:name, client_name:client, rep_name:repName, rep_type:repType, value:val, close_month:MONTHS[mIdx], close_year:yr, quarter:q, fy, status:st });
  }
  setOpps(data); oppMode='list'; toast(eid?'Deal updated':'Deal added'); go('opportunities');
}

// ════════════════════════════════════════════════
//  COLLECTIONS
// ════════════════════════════════════════════════
function collections() {
  document.getElementById('app').innerHTML = `
    ${pageHeader('Collections','Record actual money collected',
      `<button onclick="colMode='add';render()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg">+ Record</button>`
    )}
    <div id="col-body"></div>
  `;
  if (colMode==='add') renderColForm();
  else renderColList();
}

function renderColList() {
  const all = cols();
  const years = [...new Set(all.map(c=>c.year))].sort((a,b)=>b-a);
  document.getElementById('col-body').innerHTML = `
    <div class="flex flex-wrap gap-2 mb-4">
      ${sel('cf-yr', [{v:'',l:'All Years'},...years.map(y=>({v:y,l:y}))], '', 'w-auto')}
      ${sel('cf-mo', [{v:'',l:'All Months'},...MONTHS.map(m=>({v:m,l:m}))], '', 'w-auto')}
      ${sel('cf-ty', [{v:'',l:'All Types'},{v:'AM',l:'AM'},{v:'CSM',l:'CSM'}], '', 'w-auto')}
    </div>
    <div id="col-tbl"></div>
  `;
  document.getElementById('cf-yr').onchange =
  document.getElementById('cf-mo').onchange =
  document.getElementById('cf-ty').onchange = filterCols;
  filterCols();
}

function filterCols() {
  const yr = document.getElementById('cf-yr').value;
  const mo = document.getElementById('cf-mo').value;
  const ty = document.getElementById('cf-ty').value;
  let data = cols();
  if (yr) data = data.filter(c=>String(c.year)===String(yr));
  if (mo) data = data.filter(c=>c.month===mo);
  if (ty) data = data.filter(c=>c.rep_type===ty);
  const total = data.reduce((s,c)=>s+c.amount,0);
  document.getElementById('col-tbl').innerHTML = data.length===0
    ? card(emptyState('No collections recorded yet.'), 'p-0 overflow-hidden')
    : card(`
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-100">
          ${thRow(['Rep','Type','Month','Year','Amount',''])}
        </thead>
        <tbody class="divide-y divide-gray-50">
          ${data.map(c=>`
            <tr class="hover:bg-slate-50">
              <td class="px-4 py-3 font-medium">${c.rep_name}</td>
              <td class="px-4 py-3">${typeBadge(c.rep_type)}</td>
              <td class="px-4 py-3 text-gray-500">${c.month}</td>
              <td class="px-4 py-3 text-gray-500">${c.year}</td>
              <td class="px-4 py-3 font-semibold">${inr(c.amount)}</td>
              <td class="px-4 py-3"><button onclick="delCol(${c.id})" class="text-red-400 hover:underline text-xs">Del</button></td>
            </tr>`).join('')}
        </tbody>
        <tfoot class="bg-gray-50 border-t border-gray-100">
          <tr>
            <td colspan="4" class="px-4 py-3 text-xs text-gray-400">${data.length} entr${data.length!==1?'ies':'y'}</td>
            <td class="px-4 py-3 font-bold">${inr(total)}</td><td></td>
          </tr>
        </tfoot>
      </table>`, 'overflow-hidden');
}

function delCol(id) {
  if (!confirm('Delete this entry?')) return;
  setCols(cols().filter(c=>c.id!==id));
  toast('Entry deleted'); render();
}

function renderColForm() {
  const c = cfg(); const reps=c.reps||[]; const now=new Date();
  document.getElementById('col-body').innerHTML = card(`
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-semibold">Record Collection</h2>
      <button onclick="colMode='list';render()" class="text-xs text-gray-400 hover:text-gray-600">← Back</button>
    </div>
    ${reps.length===0?`<div class="bg-amber-50 border border-amber-200 text-amber-800 text-sm p-3 rounded-lg mb-4">⚠️ Add reps in <button onclick="go('settings')" class="underline font-medium">Settings</button> first.</div>`:''}
    <div class="space-y-4">
      ${frow(
        lbl('Rep *')        + sel('c-rep', reps.map(r=>({v:r.name,l:`${r.name} (${r.type})`})), ''),
        lbl('Amount (₹) *') + inp('c-amt','number','')
      )}
      ${frow(
        lbl('Month *') + sel('c-month', MONTHS.map(m=>({v:m,l:m})), MONTHS[now.getMonth()]),
        lbl('Year *')  + inp('c-year','number', now.getFullYear())
      )}
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="saveCol()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium">Record</button>
      <button onclick="colMode='list';render()" class="border border-gray-200 text-gray-600 hover:bg-gray-50 px-5 py-2 rounded-lg text-sm">Cancel</button>
    </div>
  `, 'p-6');
}

function saveCol() {
  const c=cfg(), repName=document.getElementById('c-rep').value,
        amt=parseFloat(document.getElementById('c-amt').value),
        month=document.getElementById('c-month').value,
        yr=parseInt(document.getElementById('c-year').value);
  if (!repName||isNaN(amt)||amt<=0) { alert('Fill in all required fields.'); return; }
  const repType=(c.reps.find(r=>r.name===repName)||{}).type||'AM';
  const data=cols();
  data.push({id:uid(data),rep_name:repName,rep_type:repType,month,year:yr,amount:amt});
  setCols(data); colMode='list'; toast('Collection recorded'); go('collections');
}

// ════════════════════════════════════════════════
//  INCENTIVES
// ════════════════════════════════════════════════
function incentives() {
  const yrs=[...new Set(cols().map(c=>c.year))].sort((a,b)=>b-a);
  document.getElementById('app').innerHTML = `
    ${pageHeader('Incentive Calculator','Collections × incentive rate')}
    <div class="flex flex-wrap gap-2 mb-5">
      ${sel('i-yr', [{v:'',l:'All Years'},...yrs.map(y=>({v:y,l:y}))], '', 'w-auto')}
      ${sel('i-mo', [{v:'',l:'All Months'},...MONTHS.map(m=>({v:m,l:m}))], '', 'w-auto')}
      ${sel('i-ty', [{v:'',l:'All Types'},{v:'AM',l:'AM'},{v:'CSM',l:'CSM'}], '', 'w-auto')}
    </div>
    <div id="i-metrics" class="grid grid-cols-3 gap-4 mb-5"></div>
    <div id="i-table" class="mb-5"></div>
    ${card('<p class="text-sm font-semibold text-gray-700 mb-3">Incentive vs Collections by Rep</p><canvas id="ch-i" height="130"></canvas>', 'p-5')}
  `;
  document.getElementById('i-yr').onchange =
  document.getElementById('i-mo').onchange =
  document.getElementById('i-ty').onchange = calcIncentives;
  calcIncentives();
}

function calcIncentives() {
  const c=cfg(), amPct=c.am_pct||5, csmPct=c.csm_pct||3, reps=c.reps||[];
  const selYr=document.getElementById('i-yr').value,
        selMo=document.getElementById('i-mo').value,
        selTy=document.getElementById('i-ty').value;
  let data=cols();
  if(selYr) data=data.filter(x=>String(x.year)===String(selYr));
  if(selMo) data=data.filter(x=>x.month===selMo);
  if(selTy) data=data.filter(x=>x.rep_type===selTy);
  const repMap={};
  data.forEach(x=>{if(!repMap[x.rep_name])repMap[x.rep_name]={type:x.rep_type,total:0};repMap[x.rep_name].total+=x.amount;});
  const rows=Object.entries(repMap).map(([name,{type,total}])=>{
    const custom=(reps.find(r=>r.name===name)||{}).custom_pct;
    const rate=custom!==undefined?custom:(type==='AM'?amPct:csmPct);
    return{name,type,total,rate,incentive:total*rate/100};
  });
  const sumCol=rows.reduce((s,r)=>s+r.total,0), sumInc=rows.reduce((s,r)=>s+r.incentive,0);
  document.getElementById('i-metrics').innerHTML=`${metric('Total Collections',inr(sumCol))}${metric('Total Incentive Payout',inr(sumInc))}${metric('AM Rate / CSM Rate',`${amPct}% / ${csmPct}%`)}`;
  document.getElementById('i-table').innerHTML=rows.length===0
    ? card(emptyState('No collections for this period.'),'p-0 overflow-hidden')
    : card(`<table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">${thRow(['Rep','Type','Collections','Rate','Incentive'])}</thead>
      <tbody class="divide-y divide-gray-50">
        ${rows.map(r=>`<tr class="hover:bg-slate-50">
          <td class="px-4 py-3 font-medium">${r.name}</td>
          <td class="px-4 py-3">${typeBadge(r.type)}</td>
          <td class="px-4 py-3">${inr(r.total)}</td>
          <td class="px-4 py-3 text-gray-500">${r.rate}%${(c.reps.find(x=>x.name===r.name)||{}).custom_pct!==undefined?' <span class="text-xs text-violet-500">(custom)</span>':''}</td>
          <td class="px-4 py-3 font-bold text-emerald-600">${inr(r.incentive)}</td>
        </tr>`).join('')}
      </tbody>
      <tfoot class="bg-gray-50 border-t border-gray-100"><tr>
        <td colspan="2" class="px-4 py-3 text-xs text-gray-400">${rows.length} rep${rows.length!==1?'s':''}</td>
        <td class="px-4 py-3 font-bold">${inr(sumCol)}</td><td></td>
        <td class="px-4 py-3 font-bold text-emerald-600">${inr(sumInc)}</td>
      </tr></tfoot></table>`,'overflow-hidden');
  if(charts.i){charts.i.destroy();delete charts.i;}
  if(rows.length>0){
    charts.i=new Chart(document.getElementById('ch-i'),{
      type:'bar',
      data:{labels:rows.map(r=>r.name),datasets:[
        {label:'Collections',data:rows.map(r=>r.total),backgroundColor:'#93c5fd',borderRadius:4},
        {label:'Incentive',data:rows.map(r=>r.incentive),backgroundColor:'#6ee7b7',borderRadius:4},
      ]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'₹'+Number(v).toLocaleString('en-IN',{notation:'compact'})}}}},
    });
  }
}

// ════════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════════
function settings() {
  const c=cfg(), reps=c.reps||[];
  document.getElementById('app').innerHTML=`
    ${pageHeader('Settings','Configure reps and incentive rates')}
    <div class="grid grid-cols-2 gap-5 mb-5">
      ${card(`<h2 class="text-sm font-semibold text-gray-800 mb-4">Default Incentive Rates</h2>
        <div class="space-y-4">
          <div>${lbl('AM Incentive %')}${inp('s-am','number',c.am_pct)}</div>
          <div>${lbl('CSM Incentive %')}${inp('s-csm','number',c.csm_pct)}</div>
          <button onclick="saveRates()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium">Save Rates</button>
        </div>`,'p-5')}
      ${card(`<h2 class="text-sm font-semibold text-gray-800 mb-4">Add New Rep</h2>
        <div class="space-y-4">
          <div>${lbl('Name *')}${inp('s-rname','text','')}</div>
          <div>${lbl('Type *')}${sel('s-rtype',[{v:'AM',l:'AM (Account Manager)'},{v:'CSM',l:'CSM (Customer Success)'}],'AM')}</div>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="s-cust-chk" onchange="document.getElementById('s-cust-wrap').classList.toggle('hidden',!this.checked)" class="rounded border-gray-300 text-blue-600"/>
            <label for="s-cust-chk" class="text-xs text-gray-600">Custom incentive rate for this rep</label>
          </div>
          <div id="s-cust-wrap" class="hidden">${lbl('Custom Rate (%)')}${inp('s-cpct','number',c.am_pct)}</div>
          <button onclick="addRep()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium">Add Rep</button>
        </div>`,'p-5')}
    </div>
    <div>
      ${reps.length===0 ? card(emptyState('No reps yet. Add one above.'),'p-0 overflow-hidden') : card(`
        <h2 class="text-sm font-semibold text-gray-800 mb-0 px-4 py-3 border-b border-gray-100">Reps</h2>
        <table class="w-full text-sm">
          <thead class="bg-gray-50">${thRow(['Name','Type','Incentive Rate',''])}</thead>
          <tbody class="divide-y divide-gray-50">
            ${reps.map(r=>`<tr class="hover:bg-slate-50">
              <td class="px-4 py-3 font-medium">${r.name}</td>
              <td class="px-4 py-3">${typeBadge(r.type)}</td>
              <td class="px-4 py-3 text-gray-500">${r.custom_pct!==undefined?`${r.custom_pct}% <span class="text-violet-500 text-xs">(custom)</span>`:`Default (${r.type==='AM'?c.am_pct:c.csm_pct}%)`}</td>
              <td class="px-4 py-3"><button onclick="delRep('${r.name}')" class="text-red-400 hover:underline text-xs">Remove</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`,'overflow-hidden')}
    </div>
  `;
}

function saveRates() {
  const c=cfg();
  c.am_pct=parseFloat(document.getElementById('s-am').value)||5;
  c.csm_pct=parseFloat(document.getElementById('s-csm').value)||3;
  setCfg(c); toast('Rates saved!'); go('settings');
}
function addRep() {
  const name=document.getElementById('s-rname').value.trim(),
        type=document.getElementById('s-rtype').value,
        cust=document.getElementById('s-cust-chk').checked,
        cpct=parseFloat(document.getElementById('s-cpct')?.value);
  if(!name){alert('Name is required.');return;}
  const c=cfg(); c.reps=c.reps||[];
  if(c.reps.some(r=>r.name.toLowerCase()===name.toLowerCase())){alert('Rep already exists.');return;}
  const rep={name,type};
  if(cust&&!isNaN(cpct))rep.custom_pct=cpct;
  c.reps.push(rep); setCfg(c); toast(`Added ${name} (${type})`); go('settings');
}
function delRep(name) {
  if(!confirm(`Remove ${name}?`))return;
  const c=cfg(); c.reps=(c.reps||[]).filter(r=>r.name!==name);
  setCfg(c); toast(`Removed ${name}`); go('settings');
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function toast(msg) {
  const el=document.getElementById('toast'), msgEl=document.getElementById('toast-msg');
  msgEl.textContent=msg; el.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>el.classList.add('hidden'),2500);
}

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
go('dashboard');
</script>
