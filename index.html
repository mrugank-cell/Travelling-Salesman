<body>

<div class="flex h-screen overflow-hidden">

  <!-- ══ Sidebar ══ -->

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS & PALETTE
// ═══════════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const STATUS   = ['Open','Commit','Best Case','Won','Lost'];
const OPEN_ST  = ['Open','Commit','Best Case'];
const TIERS      = ['Enterprise','Mid-Market','SMB'];
const HEALTH     = ['Green','Yellow','Red'];
const RISK       = ['Low','Medium','High'];
const DEAL_TYPES    = ['Regular','Upsell/Cross-sell'];
const INVOICE_TYPES = ['Subscription','Upsell','Renewal','Services','Adjustment'];
const INVOICE_ST    = ['open','partial','paid','overdue','cancelled'];

const PALETTE  = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#3b82f6'];
const ST_COLOR = { Open:'#3b82f6', Commit:'#8b5cf6', 'Best Case':'#f59e0b', Won:'#10b981', Lost:'#ef4444' };
const MC_THEMES = ['mc-blue','mc-green','mc-violet','mc-amber','mc-rose','mc-cyan'];
const ACCENTS   = ['chart-accent-blue','chart-accent-green','chart-accent-violet','chart-accent-amber','chart-accent-rose','chart-accent-cyan'];

const COL_CSV_FIELDS = [
  { key:'customer_name', label:'Customer Name',     required:true,  aliases:['customer','client','account','company','customer name','customer_name'] },
  { key:'am_name',       label:'AM Name',           required:true,  aliases:['am','am name','account manager','account_manager','am_name','ae'] },
  { key:'csm_name',      label:'CSM Name',          required:true,  aliases:['csm','csm name','customer success','csm_name','customer success manager'] },
  { key:'invoice_amt',   label:'Invoice Amount',    required:false, aliases:['invoice','invoice amount','amount','total','total amount','invoice_amount','invoice_amt'] },
  { key:'regular',       label:'Regular Amount',    required:false, aliases:['regular','regular amount','standard','base','base amount','regular_amount'] },
  { key:'upsell',        label:'Upsell/X-sell Amt', required:false, aliases:['upsell','upsell amount','cross sell','crosssell','upsell/crosssell','upsell/cross-sell','upsell_amount','cross-sell'] },
  { key:'month',         label:'Month',             required:false, aliases:['month','billing month','collection month'] },
  { key:'year',          label:'Year',              required:false, aliases:['year','billing year'] },
];

const ACC_FIELDS = [
  { key:'account_name', label:'Account Name', required:true,  aliases:['account name','account','company','client','customer','organisation','organization'] },
  { key:'am_name',      label:'AM Name',       required:true,  aliases:['am','am name','account manager','account_manager','ae','account executive'] },
  { key:'csm_name',     label:'CSM Name',      required:true,  aliases:['csm','csm name','customer success','csm_name','customer success manager'] },
  { key:'arr',          label:'ARR (₹)',        required:true,  aliases:['arr','annual recurring revenue','annual revenue','acv','contract value'] },
  { key:'product',      label:'Product',        required:true,  aliases:['product','products','product name','plan','subscription','package'] },
  { key:'renewal_date', label:'Renewal Date',   required:true,  aliases:['renewal date','renewal','contract renewal','expiry date','end date','contract end'] },
  { key:'account_tier', label:'Account Tier',   required:false, aliases:['tier','account tier','segment','customer tier'] },
  { key:'health_score', label:'Health Score',   required:false, aliases:['health','health score','account health','health status'] },
  { key:'churn_risk',   label:'Churn Risk',     required:false, aliases:['churn risk','churn','risk','risk level'] },
  { key:'notes',        label:'Notes',          required:false, aliases:['notes','comments','note','remarks'] },
];

// ═══════════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════════
const ls = {
  get: (k,d) => { try { return JSON.parse(localStorage.getItem(k))??d; } catch { return d; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};
const opps    = () => ls.get('opps', []);
const cols    = () => ls.get('cols', []);
const cfg     = () => ls.get('cfg', { am_pct:5, csm_pct:3, am_upsell_pct:8, csm_upsell_pct:6, reps:[] });
const accs    = () => ls.get('accs', []);
const setOpps = v  => ls.set('opps', v);
const setCols = v  => ls.set('cols', v);
const setCfg  = v  => ls.set('cfg', v);
const setAccs = v  => ls.set('accs', v);
const uid     = a  => a.length ? a.reduce((mx,x)=>Math.max(mx,Number(x.id)||0),0)+1 : 1;
const csmScores    = () => ls.get('csm_scores', []);
const setCsmScores = v  => ls.set('csm_scores', v);
const invs         = () => ls.get('invs', []);
const setInvs      = v  => ls.set('invs', v);
const importLogs    = () => ls.get('import_logs', []);
const setImportLogs = v  => ls.set('import_logs', v);
const plans    = () => ls.get('plans', []);
const setPlans = v  => ls.set('plans', v);
const targets    = () => ls.get('targets', []);
const setTargets = v  => ls.set('targets', v);

function nextAccCode(){
  const all=accs();
  const nums=all.map(a=>{const m=a.account_code?.match(/(\d+)$/);return m?parseInt(m[1]):0;});
  const next=nums.length?Math.max(0,...nums)+1:1;
  return 'ACC-'+String(next).padStart(3,'0');
}
function nextInvNum(){
  const all=invs();
  const nums=all.map(i=>{const m=i.invoice_number?.match(/(\d+)$/);return m?parseInt(m[1]):0;});
  const next=nums.length?Math.max(0,...nums)+1:1;
  return 'INV-'+String(next).padStart(4,'0');
}
function getAccById(id){return accs().find(a=>a.id===Number(id));}
function invCollected(invId){return cols().filter(c=>c.invoice_id===Number(invId)).reduce((s,c)=>s+(c.regular_amount||0)+(c.upsell_amount||0),0);}
function invOutstanding(inv){return Math.max(0,(inv.net_amount||0)-invCollected(inv.id));}
function invStatusCalc(inv){
  const out=invOutstanding(inv);
  if(inv.status==='cancelled')return 'cancelled';
  if(out<=0)return 'paid';
  const due=inv.due_date?new Date(inv.due_date):null;
  const today=new Date();today.setHours(0,0,0,0);
  if(due&&due<today)return 'overdue';
  if(invCollected(inv.id)>0)return 'partial';
  return 'open';
}

// ═══════════════════════════════════════════════════
//  FY + ENRICHMENT HELPERS
// ═══════════════════════════════════════════════════
function fyq(mIdx, yr) {
  const m=mIdx+1; let q,s;
  if(m>=4){s=yr;   q=m<=6?'Q1':m<=9?'Q2':'Q3';}
  else    {s=yr-1; q='Q4';}
  return {q, fy:`FY${s}-${String(s+1).slice(2)}`};
}
function nowFy(){ const n=new Date(); return fyq(n.getMonth(),n.getFullYear()).fy; }
const inr = n => '₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});
const compact = v => '₹'+Number(v).toLocaleString('en-IN',{notation:'compact',maximumFractionDigits:1});

function enrichAcc(a) {
  const arr=Number(a.arr)||0, mrr=arr/12;
  let days=null, renewalStatus='', renewalQ='', renewalFy='';
  if(a.renewal_date){
    const rd=new Date(a.renewal_date);
    if(!isNaN(rd)){
      const t=new Date(); t.setHours(0,0,0,0);
      days=Math.round((rd-t)/86400000);
      if(days<0)   renewalStatus='Expired';
      else if(days<30)  renewalStatus='Critical';
      else if(days<90)  renewalStatus='Soon';
      else if(days<180) renewalStatus='Upcoming';
      else              renewalStatus='Future';
      const {q,fy}=fyq(rd.getMonth(),rd.getFullYear());
      renewalQ=q; renewalFy=fy;
    }
  }
  return {...a, arr, mrr, days, renewalStatus, renewalQ, renewalFy};
}

function logImport(type, filename, total, success, errors){
  const logs=importLogs();
  logs.unshift({id:uid(logs),type,filename:filename||'upload',timestamp:new Date().toISOString(),total,success,failed:total-success,errors:errors||[]});
  setImportLogs(logs.slice(0,100));
}
function getPlanForDate(dateStr){
  const c=cfg();
  const defaults={am_pct:c.am_pct||5,csm_pct:c.csm_pct||3,am_upsell_pct:c.am_upsell_pct||8,csm_upsell_pct:c.csm_upsell_pct||6};
  if(!dateStr) return defaults;
  const d=new Date(dateStr);
  if(isNaN(d)) return defaults;
  const active=plans().filter(p=>{
    const from=p.effective_from?new Date(p.effective_from):null;
    const to=p.effective_to?new Date(p.effective_to):null;
    return (!from||d>=from)&&(!to||d<=to);
  }).sort((a,b)=>new Date(b.effective_from||0)-new Date(a.effective_from||0));
  return active[0]||defaults;
}
function getTarget(repName, fy, q){
  return targets().find(t=>t.rep_name===repName&&t.fy===fy&&t.quarter===q)||null;
}
function applyTargetLogic(baseInc, collected, tgt){
  if(!tgt) return baseInc;
  const threshAmt=(tgt.target_amount||0)*(tgt.threshold_pct||0)/100;
  if(threshAmt>0&&collected<threshAmt) return 0;
  let inc=baseInc;
  if(tgt.accelerator_pct&&tgt.target_amount&&collected>tgt.target_amount){
    const onTarget=tgt.target_amount;
    const overTarget=collected-onTarget;
    const baseRate=inc>0?inc/collected:0;
    inc=onTarget*baseRate+(overTarget*tgt.accelerator_pct/100);
  }
  if(tgt.cap_amount&&inc>tgt.cap_amount) inc=tgt.cap_amount;
  return inc;
}

// ═══════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════
let page='dashboard', charts={};
let oppMode='list', colMode='list', accMode='list';
let editId=null, accEditId=null;
let csvParsed=null, csvMapping={};
let colCsvParsed=null, colCsvMapping={};

function go(p, filter=null){
  if(filter) window._pageFilter=filter;
  page=p; oppMode='list'; colMode='list'; accMode='list';
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const navPage=p==='acc360'?'accounts':p;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.page===navPage);

}
function render(){
  document.getElementById('app').innerHTML='';
  ({dashboard,accounts,opportunities,invoices,collections,incentives,quarterly,targets:targets_page,reports,settings,acc360})[page]();
}

// Chart.js global defaults
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.color = '#94a3b8';
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.padding = 14;

// ═══════════════════════════════════════════════════
//  SHARED COMPONENTS
// ═══════════════════════════════════════════════════
function card(html,cls=''){
  return `<div class="card ${cls}">${html}</div>`;
}
function mc(label,val,sub='',ti=0,link=null){
  const theme=MC_THEMES[ti%MC_THEMES.length];
  const cls=link?'cursor-pointer transition-all duration-150 hover:scale-[1.03] hover:brightness-110':'';
  const attr=link?`onclick="${link}" role="button" tabindex="0"`:'';
  return `<div class="mc ${theme} ${cls}" ${attr}>
    <p class="text-[11px] font-semibold uppercase tracking-widest" style="opacity:.75">${label}</p>
    <p class="text-2xl font-extrabold mt-1" style="position:relative;z-index:1">${val}</p>
    ${sub?`<p class="text-xs mt-0.5" style="opacity:.6;position:relative;z-index:1">${sub}</p>`:''}
    ${link?`<p class="text-[9px] mt-2 font-medium" style="opacity:.45;position:relative;z-index:1;letter-spacing:.06em">VIEW DETAILS →</p>`:''}

}
function chartCard(title,id,height=220,accentIdx=0){
  const ac=ACCENTS[accentIdx%ACCENTS.length];
  return `<div class="card overflow-hidden">
    <div class="${ac}"></div>
    <div class="p-5"><p class="text-sm font-semibold text-slate-700 mb-3">${title}</p><canvas id="${id}" height="${height}"></canvas></div>
  </div>`;
}
function sectionHead(title,emoji=''){
  return `<div class="flex items-center gap-2.5 mb-4 mt-6">
    <div class="w-1.5 h-6 rounded-full bg-gradient-to-b from-indigo-500 to-blue-400"></div>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-[.12em]">${emoji} ${title}</p>
  </div>`;
}
function pageHeader(title,sub,btnHtml=''){
  return `<div class="flex items-start justify-between mb-6">
    <div>
      <h1 class="text-2xl font-extrabold text-slate-800">${title}</h1>
      ${sub?`<p class="text-sm text-slate-400 mt-0.5">${sub}</p>`:''}
    </div>
    ${btnHtml}
  </div>`;
}
function inp(id,type,val,cls='',extra=''){
  return `<input id="${id}" type="${type}" value="${val}" ${extra} class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition ${cls}"/>`;
}
function sel(id,opts,selVal,cls=''){
  const o=opts.map(o=>{
    const v=typeof o==='object'?o.v:o, l=typeof o==='object'?o.l:o;
    return `<option value="${v}" ${String(v)===String(selVal)?'selected':''}>${l}</option>`;
  }).join('');
  return `<select id="${id}" class="border border-slate-200 bg-slate-50 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition ${cls}">${o}</select>`;
}
function lbl(t){ return `<label class="block text-xs font-semibold text-slate-500 mb-1.5">${t}</label>`; }
function frow(...f){ return `<div class="grid grid-cols-${f.length} gap-4">${f.map(x=>`<div>${x}</div>`).join('')}</div>`; }
function emptyState(msg){
  return `<div class="text-center py-16">
    <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center text-2xl mx-auto mb-3">📭</div>
    <p class="text-sm text-slate-400">${msg}</p>
  </div>`;
}
function thRow(hs){
  return `<tr>${hs.map(h=>`<th class="text-left px-4 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">${h}</th>`).join('')}</tr>`;
}

// Badges
function stBadge(s){
  const m={Open:'bg-blue-100 text-blue-700 border-blue-200',Commit:'bg-violet-100 text-violet-700 border-violet-200','Best Case':'bg-amber-100 text-amber-700 border-amber-200',Won:'bg-emerald-100 text-emerald-700 border-emerald-200',Lost:'bg-red-100 text-red-700 border-red-200'};
  return `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[s]||'bg-slate-100 text-slate-500 border-slate-200'}">${s}</span>`;
}
function typeBadge(t){
  const c=t==='AM'?'bg-blue-100 text-blue-700 border-blue-200':'bg-orange-100 text-orange-700 border-orange-200';
  return `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${c}">${t}</span>`;
}
function healthBadge(h){
  const m={Green:'bg-emerald-100 text-emerald-700 border-emerald-200',Yellow:'bg-amber-100 text-amber-700 border-amber-200',Red:'bg-red-100 text-red-700 border-red-200'};
  const d={Green:'🟢',Yellow:'🟡',Red:'🔴'};
  return h?`<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[h]||''}">${d[h]||''} ${h}</span>`:'<span class="text-slate-300">—</span>';
}
function riskBadge(r){
  const m={Low:'bg-emerald-100 text-emerald-700 border-emerald-200',Medium:'bg-amber-100 text-amber-700 border-amber-200',High:'bg-red-100 text-red-700 border-red-200'};
  return r?`<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[r]||''}">${r}</span>`:'<span class="text-slate-300">—</span>';
}
function renewBadge(s){
  const m={Critical:'bg-red-100 text-red-700 border-red-200',Soon:'bg-amber-100 text-amber-700 border-amber-200',Upcoming:'bg-blue-100 text-blue-700 border-blue-200',Future:'bg-slate-100 text-slate-500 border-slate-200',Expired:'bg-rose-200 text-rose-800 border-rose-300'};
  return s?`<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[s]||''}">${s}</span>`:'';
}
function dealTypeBadge(t){
  const isU=t==='Upsell/Cross-sell';
  return `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border" style="background:${isU?'rgba(245,158,11,0.15)':'rgba(16,185,129,0.12)'};color:${isU?'#fcd34d':'#6ee7b7'};border-color:${isU?'rgba(245,158,11,0.3)':'rgba(16,185,129,0.25)'}">${isU?'⬆ Upsell/X-sell':'● Regular'}</span>`;
}
function tierBadge(t){
  const m={Enterprise:'bg-violet-100 text-violet-700 border-violet-200','Mid-Market':'bg-blue-100 text-blue-700 border-blue-200',SMB:'bg-slate-100 text-slate-600 border-slate-200'};
  return t?`<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[t]||'bg-slate-100 text-slate-500 border-slate-200'}">${t}</span>`:'<span class="text-slate-300">—</span>';
}
function invStatusBadge(s){
  const m={open:'bg-blue-100 text-blue-700 border-blue-200',partial:'bg-amber-100 text-amber-700 border-amber-200',paid:'bg-emerald-100 text-emerald-700 border-emerald-200',overdue:'bg-red-100 text-red-700 border-red-200',cancelled:'bg-slate-100 text-slate-500 border-slate-200'};
  const label=(s||'open').charAt(0).toUpperCase()+(s||'open').slice(1);
  return `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${m[s]||m.open}">${label}</span>`;
}

function filterAccs(){
  const am=document.getElementById('af-am').value, csm=document.getElementById('af-csm').value;
  const prod=document.getElementById('af-prod').value, tier=document.getElementById('af-tier').value;
  const hlth=document.getElementById('af-health').value, risk=document.getElementById('af-risk').value;
  const renew=document.getElementById('af-renew').value;
  let data=accs().map(enrichAcc);
  if(am)    data=data.filter(a=>a.am_name===am);
  if(csm)   data=data.filter(a=>a.csm_name===csm);
  if(prod)  data=data.filter(a=>a.product===prod);
  if(tier)  data=data.filter(a=>a.account_tier===tier);
  if(hlth)  data=data.filter(a=>a.health_score===hlth);
  if(risk)  data=data.filter(a=>a.churn_risk===risk);
  if(renew) data=data.filter(a=>a.days!=null&&a.days>=0&&a.days<=parseInt(renew));
  const total=data.reduce((s,a)=>s+a.arr,0);
  document.getElementById('acc-tbl').innerHTML=data.length===0
    ? card(emptyState('No accounts match the filters.'),'p-4')
    : `<div class="card overflow-hidden">
      <div class="overflow-x-auto">
      <table class="w-full text-sm dt min-w-[1000px]">

            <td class="px-4 py-3 text-xs font-mono text-slate-400">${a.account_code||'—'}</td>
            <td class="px-4 py-3 font-semibold text-slate-800 max-w-[160px] truncate">${a.account_name}</td>
            <td class="px-4 py-3 text-slate-500 text-xs">${a.am_name}</td>
            <td class="px-4 py-3 text-slate-500 text-xs">${a.csm_name}</td>
            <td class="px-4 py-3"><p class="font-bold text-slate-800">${inr(a.arr)}</p><p class="text-xs text-slate-400">${inr(a.mrr)}/mo</p></td>
            <td class="px-4 py-3 text-slate-600 text-xs">${a.product||'—'}</td>
            <td class="px-4 py-3">
              <p class="text-xs text-slate-500">${a.renewal_date||'—'}</p>
              ${a.days!=null?`<p class="text-xs font-bold ${a.days<0?'text-red-500':a.days<30?'text-red-500':a.days<90?'text-amber-500':'text-slate-400'}">${a.days<0?'Expired':a.days+'d left'}</p>`:''}
              ${renewBadge(a.renewalStatus)}
            </td>
            <td class="px-4 py-3">${healthBadge(a.health_score)}</td>
            <td class="px-4 py-3">${riskBadge(a.churn_risk)}</td>
            <td class="px-4 py-3 whitespace-nowrap" onclick="event.stopPropagation()">
              <button onclick="goAcc360(${a.id})" class="text-indigo-400 hover:underline text-xs mr-2">View</button>
              <button onclick="startEditAcc(${a.id})" class="text-slate-400 hover:underline text-xs mr-2">Edit</button>
              <button onclick="delAcc(${a.id})" class="text-red-400 hover:underline text-xs">Del</button>
            </td>
          </tr>`).join('')}
        </tbody>
        <tfoot class="bg-slate-50 border-t border-slate-100">
          <tr>
            <td colspan="4" class="px-4 py-3 text-xs text-slate-400">${data.length} account${data.length!==1?'s':''}</td>
            <td class="px-4 py-3 font-bold text-slate-700">${inr(total)}</td>
            <td colspan="5"></td>
          </tr>
        </tfoot>
      </table>
      </div>
    </div>`;
}

function handleFileDrop(e){const f=e.dataTransfer.files[0]; if(f) processCSVFile(f);}
function handleFileInput(i){if(i.files[0]) processCSVFile(i.files[0]);}
function processCSVFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const parsed=parseCSV(e.target.result);
    if(!parsed.headers.length){toast('Could not parse CSV.');return;}
    csvParsed=parsed; csvMapping=autoMapCols(parsed.headers);
    renderMappingUI(file.name,parsed);
  };
  reader.readAsText(file);
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/); if(!lines.length) return{headers:[],rows:[]};
  const headers=splitLine(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=splitLine(l);
    return headers.reduce((o,h,i)=>{o[h]=(vals[i]||'').trim();return o;},{});
  });
  return{headers,rows};
}
function splitLine(line){
  const r=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=c;}}
  r.push(cur.trim());
  return r.map(v=>v.replace(/^"|"$/g,''));
}
function autoMapCols(headers){
  const norm=h=>h.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
  const m={};
  ACC_FIELDS.forEach(f=>{
    const found=headers.find(h=>f.aliases.some(a=>norm(h)===a||norm(h).includes(a)));
    m[f.key]=found||'';
  });
  return m;
}

function executeImport(){
  const mapping={};
  ACC_FIELDS.forEach(f=>{const el=document.getElementById('map-'+f.key);if(el)mapping[f.key]=el.value;});
  const missing=ACC_FIELDS.filter(f=>f.required&&!mapping[f.key]).map(f=>f.label);
  if(missing.length){alert('Map required fields: '+missing.join(', '));return;}
  const existing=accs(); let added=0;
  const imported=csvParsed.rows.map(row=>{
    if(!row[mapping.account_name]){return null;}
    added++;
    const arrRaw=row[mapping.arr]||'';
    const arr=parseFloat(arrRaw.replace(/[^0-9.]/g,''));
    return{account_name:row[mapping.account_name]||'',am_name:row[mapping.am_name]||'',csm_name:row[mapping.csm_name]||'',
      arr:isNaN(arr)?0:arr,product:mapping.product?row[mapping.product]||'':'',
      renewal_date:mapping.renewal_date?row[mapping.renewal_date]||'':'',
      account_tier:mapping.account_tier?row[mapping.account_tier]||'':'',
      health_score:mapping.health_score?row[mapping.health_score]||'':'',
      churn_risk:mapping.churn_risk?row[mapping.churn_risk]||'':'',
      notes:mapping.notes?row[mapping.notes]||'':''};
  }).filter(Boolean);
  const maxId=existing.length?existing.reduce((mx,a)=>Math.max(mx,Number(a.id)||0),0):0;
  imported.forEach((a,i)=>{a.id=maxId+i+1; if(!a.account_code){const nums=[...existing,...imported.slice(0,i)].map(x=>{const m=x.account_code?.match(/(\d+)$/);return m?parseInt(m[1]):0;});a.account_code='ACC-'+String(Math.max(0,...nums)+1).padStart(3,'0');}});
  setAccs([...existing,...imported]);
  logImport('accounts', 'accounts.csv', (csvParsed.rows||[]).length, added, []);
  csvParsed=null; csvMapping={};
  toast(`Imported ${added} accounts`); accMode='list'; go('accounts');
}

      return !isNaN(rd)&&rd.getMonth()===m&&rd.getFullYear()===y;
    }).reduce((s,a)=>s+a.arr,0));
    charts['rp-cal']=new Chart(document.getElementById('rp-cal'),{
      type:'bar',
      data:{labels,datasets:[{label:'Renewal ARR',data:vals,backgroundColor:vals.map(v=>v>0?'#6366f1':'#e2e8f0'),borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:compact},grid:{color:'rgba(255,255,255,0.06)'}}}},
    });
  }

  // 8. Pipeline by Status (donut)
  if(document.getElementById('rp-pipe-st')){
    charts['rp-pipe-st']=new Chart(document.getElementById('rp-pipe-st'),{
      type:'doughnut',
      data:{labels:STATUS,datasets:[{data:STATUS.map(s=>filtO.filter(o=>o.status===s).reduce((a,o)=>a+o.value,0)),backgroundColor:Object.values(ST_COLOR),borderWidth:2,hoverOffset:8}]},
      options:{...chartCfg,cutout:'62%'},
    });
  }

  // 9. Pipeline by Quarter (grouped bar)
  if(document.getElementById('rp-pipe-q')){
    const qs=['Q1','Q2','Q3','Q4'];
    charts['rp-pipe-q']=new Chart(document.getElementById('rp-pipe-q'),{
      type:'bar',
      data:{labels:qs,datasets:STATUS.map(s=>({label:s,data:qs.map(q=>filtO.filter(o=>o.quarter===q&&o.status===s).reduce((a,o)=>a+o.value,0)),backgroundColor:ST_COLOR[s],borderRadius:4,borderSkipped:false}))},
      options:{...chartCfg,scales:{x:{grid:{display:false}},y:{ticks:{callback:compact},grid:{color:'rgba(255,255,255,0.06)'}}}},
    });
  }

  // 10. Monthly Collections Trend (line)
  if(document.getElementById('rp-coll-trend')){
    const now=new Date();
    const pts=[];
    for(let i=11;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      pts.push({label:MONTHS[d.getMonth()].slice(0,3)+' '+d.getFullYear(),m:MONTHS[d.getMonth()],y:d.getFullYear()});
    }
    const vals=pts.map(p=>filtC.filter(c=>c.month===p.m&&Number(c.year)===p.y).reduce((s,c)=>s+(c.regular_amount??0)+(c.upsell_amount??0)+(c.amount??0),0));
    charts['rp-coll-trend']=new Chart(document.getElementById('rp-coll-trend'),{
      type:'line',
      data:{labels:pts.map(p=>p.label),datasets:[{label:'Collections',data:vals,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.12)',fill:true,tension:0.4,pointBackgroundColor:'#10b981',pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:compact},grid:{color:'rgba(255,255,255,0.06)'}}}},
    });
  }

  // 11. Incentive Payout by Rep — Regular vs Upsell (stacked bar)
  if(document.getElementById('rp-incentive')){
    const c=cfg(), amPct=c.am_pct||5, csmPct=c.csm_pct||3;
    const amUp=c.am_upsell_pct||8, csmUp=c.csm_upsell_pct||6, reps=c.reps||[];
    const repMap={};
    function _rpAdd(name,type,reg,ups){if(!name)return;if(!repMap[name])repMap[name]={type,reg:0,ups:0};repMap[name].reg+=reg;repMap[name].ups+=ups;}
    filtC.forEach(x=>{
      if(x.am_name!==undefined){_rpAdd(x.am_name,'AM',x.regular_amount||0,x.upsell_amount||0);_rpAdd(x.csm_name,'CSM',x.regular_amount||0,x.upsell_amount||0);}
      else if(x.regular_amount!==undefined){_rpAdd(x.rep_name,x.rep_type,x.regular_amount||0,x.upsell_amount||0);}
      else{if((x.deal_type||'Regular')==='Upsell/Cross-sell')_rpAdd(x.rep_name,x.rep_type,0,x.amount||0);else _rpAdd(x.rep_name,x.rep_type,x.amount||0,0);}
    });
    const repNames=Object.keys(repMap);
    const regD=repNames.map(n=>{const{type,reg}=repMap[n];const custom=(reps.find(r=>r.name===n)||{}).custom_pct;const rate=custom!==undefined?custom:(type==='AM'?amPct:csmPct);return reg*rate/100;});
    const upD=repNames.map(n=>{const{type,ups}=repMap[n];const custom=(reps.find(r=>r.name===n)||{}).custom_pct;const rate=custom!==undefined?custom:(type==='AM'?amUp:csmUp);return ups*rate/100;});
    charts['rp-incentive']=new Chart(document.getElementById('rp-incentive'),{
      type:'bar',
      data:{labels:repNames,datasets:[
        {label:'Regular',data:regD,backgroundColor:'#6366f1',borderRadius:4,borderSkipped:false},
        {label:'Upsell/X-sell',data:upD,backgroundColor:'#f59e0b',borderRadius:4,borderSkipped:false},
      ]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11}}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:compact},grid:{color:'rgba(255,255,255,0.06)'}}}},
    });
  }
}

function saveInv(eid){
  const num=(document.getElementById('iv-num').value||'').trim();
  const accId=parseInt(document.getElementById('iv-acc').value);
  const type=document.getElementById('iv-type').value;
  const date=document.getElementById('iv-date').value;
  const due=document.getElementById('iv-due').value;
  const net=parseFloat(document.getElementById('iv-net').value)||0;
  const tax=parseFloat(document.getElementById('iv-tax').value)||0;
  if(!num||!accId||!type||!date||!due||net<=0){alert('Fill in all required fields.');return;}
  const rec={invoice_number:num,account_id:accId,invoice_type:type,invoice_date:date,due_date:due,
    gross_amount:net+tax,tax_amount:tax,net_amount:net,
    billing_period_start:document.getElementById('iv-bps').value||null,
    billing_period_end:document.getElementById('iv-bpe').value||null,
    notes:document.getElementById('iv-notes').value.trim()};
  let data=invs();
  if(eid!==null){data=data.map(i=>i.id===eid?{...i,...rec}:i);}
  else{rec.id=uid(data);data.push(rec);}
  setInvs(data); accMode='list'; toast(eid?'Invoice updated':'Invoice added'); go('invoices');
}

  const h=['Invoice Number','Account Code','Invoice Type','Invoice Date','Due Date','Net Amount','Tax Amount','Billing Period Start','Billing Period End','Notes'];

    ['INV-0002','ACC-002','Upsell','2026-04-01','2026-04-10','400000','72000','2026-04-01','2027-03-31','Q1 upsell']];
  const csv=[h,...r].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='invoices_template.csv';a.click();
}

function saveOpp(eid){
  const name=document.getElementById('o-name').value.trim(), client=document.getElementById('o-client').value.trim();

  const mIdx=parseInt(document.getElementById('o-month').value), yr=parseInt(document.getElementById('o-year').value);
  const st=document.getElementById('o-status').value;
  if(!name||!client||isNaN(val)||val<0){alert('Fill in all required fields.');return;}
  const c=cfg(), repName=repEl?.value||'', repType=(c.reps.find(r=>r.name===repName)||{}).type||'AM';
  const dt=document.getElementById('o-dtype').value||'Regular';
  const{q,fy}=fyq(mIdx,yr); let data=opps();
  if(eid!==null){data=data.map(o=>o.id===eid?{...o,opportunity_name:name,client_name:client,rep_name:repName,rep_type:repType,value:val,close_month:MONTHS[mIdx],close_year:yr,quarter:q,fy,status:st,deal_type:dt}:o);}
  else{data.push({id:uid(data),opportunity_name:name,client_name:client,rep_name:repName,rep_type:repType,value:val,close_month:MONTHS[mIdx],close_year:yr,quarter:q,fy,status:st,deal_type:dt});}

}

function handleColFileDrop(e){const f=e.dataTransfer.files[0]; if(f) processColCSVFile(f);}
function handleColFileInput(i){if(i.files[0]) processColCSVFile(i.files[0]);}
function processColCSVFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const parsed=parseCSV(e.target.result);
    if(!parsed.headers.length){toast('Could not parse CSV.');return;}
    colCsvParsed=parsed; colCsvMapping=autoMapColCols(parsed.headers);
    renderColMappingUI(file.name,parsed);
  };
  reader.readAsText(file);
}
function autoMapColCols(headers){
  const norm=h=>h.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
  const m={};
  COL_CSV_FIELDS.forEach(f=>{
    const found=headers.find(h=>f.aliases.some(a=>norm(h)===a||norm(h).includes(a)));
    m[f.key]=found||'';
  });
  return m;
}

function executeColImport(){
  const mapping={};
  COL_CSV_FIELDS.forEach(f=>{const el=document.getElementById('cmap-'+f.key);if(el)mapping[f.key]=el.value;});
  if(!mapping.customer_name){alert('Map Customer Name column.');return;}
  const defMo=document.getElementById('cmap-def-mo').value;
  const defYr=parseInt(document.getElementById('cmap-def-yr').value)||new Date().getFullYear();
  const existing=cols(); let added=0;
  const imported=colCsvParsed.rows.map(row=>{
    const cust=mapping.customer_name?(row[mapping.customer_name]||'').trim():'';
    if(!cust) return null;
    const amName=(mapping.am_name?row[mapping.am_name]||'':'').trim();
    const csmName=(mapping.csm_name?row[mapping.csm_name]||'':'').trim();
    const invAmt=parseFloat((mapping.invoice_amt?row[mapping.invoice_amt]:'')||'0')||0;
    let reg=parseFloat((mapping.regular?row[mapping.regular]:'')||'0')||0;
    let ups=parseFloat((mapping.upsell?row[mapping.upsell]:'')||'0')||0;
    if(!mapping.regular&&!mapping.upsell&&invAmt>0){reg=invAmt;ups=0;}
    else if(reg===0&&ups===0&&invAmt>0){reg=invAmt;}
    const rawMonth=mapping.month?(row[mapping.month]||''):'';
    const month=parseMonthStr(rawMonth)||defMo;
    const rawYear=mapping.year?(row[mapping.year]||''):'';
    const year=parseInt(rawYear)||defYr;
    added++;
    return{customer_name:cust,am_name:amName,csm_name:csmName,invoice_amount:reg+ups,regular_amount:reg,upsell_amount:ups,month,year};
  }).filter(Boolean);
  const maxId=existing.length?Math.max(...existing.map(a=>a.id)):0;
  imported.forEach((r,i)=>{r.id=maxId+i+1;});
  setCols([...existing,...imported]);
  logImport('collections', 'collections.csv', (colCsvParsed.rows||[]).length, added, []);
  colCsvParsed=null; colCsvMapping={};
  toast(`Imported ${added} collection entries`); colMode='list'; go('collections');
}
function parseMonthStr(s){
  if(!s)return null; const t=s.trim();
  const idx=MONTHS.findIndex(m=>m.toLowerCase()===t.toLowerCase()||m.slice(0,3).toLowerCase()===t.slice(0,3).toLowerCase());
  if(idx>=0)return MONTHS[idx];
  const n=parseInt(t); if(n>=1&&n<=12)return MONTHS[n-1];
  return null;
}
function downloadColTemplate(){
  const h=['Customer Name','AM Name','CSM Name','Invoice Amount','Regular','Upsell/Crosssell','Month'];
  const r=[
    ['Reliance Jio','Rahul Sharma','Amit Singh','1200000','800000','400000','November'],
    ['Infosys Ltd','Priya Patel','Sara Mehta','600000','600000','0','September'],
    ['TCS','Neha Gupta','Amit Singh','1400000','0','1400000','November'],
    ['Flipkart','Priya Patel','Sara Mehta','900000','500000','400000','January'],
  ];
  const csv=[h,...r].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='collections_template.csv'; a.click();
}

function renderAcc360Inc(d){
  const {acc,accCols}=d;
  const c=cfg(), amPct=c.am_pct||5, csmPct=c.csm_pct||3, amUp=c.am_upsell_pct||8, csmUp=c.csm_upsell_pct||6, reps=c.reps||[];
  const repMap={};
  function _add(name,type,reg,ups){if(!name)return;if(!repMap[name])repMap[name]={type,reg:0,ups:0};repMap[name].reg+=reg;repMap[name].ups+=ups;}
  accCols.forEach(x=>{
    if(x.am_name!==undefined){_add(x.am_name,'AM',x.regular_amount||0,x.upsell_amount||0);_add(x.csm_name,'CSM',x.regular_amount||0,x.upsell_amount||0);}
    else if(x.regular_amount!==undefined){_add(x.rep_name,x.rep_type,x.regular_amount||0,x.upsell_amount||0);}
    else{if((x.deal_type||'Regular')==='Upsell/Cross-sell')_add(x.rep_name,x.rep_type,0,x.amount||0);else _add(x.rep_name,x.rep_type,x.amount||0,0);}
  });
  const rows=Object.entries(repMap).map(([name,{type,reg,ups}])=>{
    const cu=(reps.find(r=>r.name===name)||{}).custom_pct;
    const rRate=cu!==undefined?cu:(type==='AM'?amPct:csmPct);
    const uRate=cu!==undefined?cu:(type==='AM'?amUp:csmUp);
    const regInc=reg*rRate/100, upsInc=ups*uRate/100;
    return{name,type,reg,ups,rRate,uRate,regInc,upsInc,total:regInc+upsInc};
  }).sort((a,b)=>b.total-a.total);
  document.getElementById('a360-body').innerHTML=rows.length===0
    ? card(emptyState('No collections linked to this account yet.'),'p-4')
    : `<div class="card overflow-hidden"><div class="overflow-x-auto">
    <table class="w-full text-sm dt min-w-[860px]">

          <td class="px-4 py-3 font-semibold text-slate-800">${r.name}</td>

          <td class="px-4 py-3 text-xs" style="color:#818cf8">${r.rRate}%</td>
          <td class="px-4 py-3 font-semibold" style="color:#a5b4fc">${r.regInc>0?inr(Math.round(r.regInc)):'—'}</td>
          <td class="px-4 py-3 text-slate-500">${r.ups>0?inr(r.ups):'—'}</td>
          <td class="px-4 py-3 text-xs" style="color:#fbbf24">${r.uRate}%</td>
          <td class="px-4 py-3 font-semibold" style="color:#fcd34d">${r.upsInc>0?inr(Math.round(r.upsInc)):'—'}</td>
          <td class="px-4 py-3 font-bold text-emerald-400">${inr(Math.round(r.total))}</td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>`;
}

function qtrToMonths(fy, q){
  const sy=parseInt(fy.slice(2,6));
  const map={Q1:[{m:'April',y:sy},{m:'May',y:sy},{m:'June',y:sy}],
             Q2:[{m:'July',y:sy},{m:'August',y:sy},{m:'September',y:sy}],
             Q3:[{m:'October',y:sy},{m:'November',y:sy},{m:'December',y:sy}],
             Q4:[{m:'January',y:sy+1},{m:'February',y:sy+1},{m:'March',y:sy+1}]};
  return map[q]||[];
}
function getCsmScore(name,fy,q){
  return csmScores().find(s=>s.csm_name===name&&s.fy===fy&&s.quarter===q)||{qbr:0,adoption:0,efforts:0};
}
function saveQtrScore(name,fy,q){
  const sid=name.replace(/\s+/g,'-');
  const qbr=Math.min(5,Math.max(0,parseFloat(document.getElementById('sq-qbr-'+sid)?.value)||0));
  const adoption=Math.min(5,Math.max(0,parseFloat(document.getElementById('sq-adopt-'+sid)?.value)||0));
  const efforts=Math.min(5,Math.max(0,parseFloat(document.getElementById('sq-eff-'+sid)?.value)||0));
  const sc=csmScores().filter(s=>!(s.csm_name===name&&s.fy===fy&&s.quarter===q));
  sc.push({csm_name:name,fy,quarter:q,qbr,adoption,efforts});
  setCsmScores(sc); toast('Scores saved for '+name+'!'); renderQtrBody();
}
function quarterly(){
  const now=new Date();
  const curFyq=fyq(now.getMonth(),now.getFullYear());
  const allCols=cols();
  const allFys=[...new Set(allCols.map(c=>{const mi=MONTHS.indexOf(c.month);return mi>=0?fyq(mi,Number(c.year)).fy:null;}).filter(Boolean))].sort().reverse();
  if(!allFys.includes(curFyq.fy)) allFys.unshift(curFyq.fy);
  window._selQtr=curFyq.q;
  document.getElementById('app').innerHTML=`
    ${pageHeader('Quarterly Incentives','Collections & performance-weighted payouts by quarter',
      `<button onclick="downloadQtrCSV()" class="border text-emerald-400 text-sm font-medium px-3 py-2 rounded-xl transition hover:bg-emerald-500/10" style="border-color:rgba(16,185,129,0.35)">↓ Download</button>`
    )}
    <div class="flex flex-wrap gap-3 items-center mb-5">
      ${sel('q-fy',[...allFys.map(f=>({v:f,l:f}))],curFyq.fy,'w-auto')}
      <div class="flex gap-1">
        ${['Q1','Q2','Q3','Q4'].map(q=>`
          <button id="qtab-${q}" onclick="selectQtr('${q}')"
            class="px-4 py-2 rounded-xl text-sm font-semibold transition"
            style="${q===curFyq.q?'background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)':'border:1px solid rgba(255,255,255,0.1);color:#94a3b8'}"
          >${q}</button>`).join('')}

    </div>
    <div id="qtr-body"></div>

function selectQtr(q){
  window._selQtr=q;
  ['Q1','Q2','Q3','Q4'].forEach(qq=>{

function renderQtrBody(){

  const c=cfg(), amPct=c.am_pct||5, csmPct=c.csm_pct||3, amUp=c.am_upsell_pct||8, csmUp=c.csm_upsell_pct||6, reps=c.reps||[];
  if(!selFy){document.getElementById('qtr-body').innerHTML=card(emptyState('Select a financial year.'),'p-4');return;}
  const months=qtrToMonths(selFy,selQ);
  const mset=new Set(months.map(x=>x.m+'|'+x.y));
  const data=cols().filter(x=>mset.has(x.month+'|'+Number(x.year)));
  const amMap={}, csmMap={};
  data.forEach(x=>{
    const reg=x.regular_amount||0, ups=x.upsell_amount||0;

    if(amN){if(!amMap[amN])amMap[amN]={reg:0,ups:0};amMap[amN].reg+=reg;amMap[amN].ups+=ups;}

    const baseRegInc=reg*rRate/100, baseUpsInc=ups*uRate/100;
    const baseTotal=baseRegInc+baseUpsInc;
    const tgt=getTarget(name,selFy,selQ);
    const collected=reg+ups;
    const finalTotal=applyTargetLogic(baseTotal,collected,tgt);
    const gated=tgt&&finalTotal===0&&baseTotal>0;
    const tgtPct=tgt?.target_amount?Math.round(collected/tgt.target_amount*100):null;
    return{name,reg,ups,rRate,uRate,regInc:baseRegInc,upsInc:baseUpsInc,total:finalTotal,gated,tgtPct,tgt};
  }).sort((a,b)=>b.total-a.total);
  const csmRows=Object.entries(csmMap).map(([name,{reg,ups}])=>{

    return{name,reg,ups,rRate,uRate,baseInc,qbr:sc.qbr||0,adoption:sc.adoption||0,efforts:sc.efforts||0,avg,mult,finalInc:finalBase*mult,gated,tgtPct,tgt};

    if(amN){if(!amMap[amN])amMap[amN]={reg:0,ups:0};amMap[amN].reg+=reg;amMap[amN].ups+=ups;}

function calcIncentives(){
  const selFy=document.getElementById('i-fy')?.value||'';
  const selMo=document.getElementById('i-mo')?.value||'';
  const reps=(cfg().reps)||[];
  let data=cols();
  if(selFy) data=data.filter(x=>{const mi=MONTHS.indexOf(x.month);return mi>=0&&fyq(mi,Number(x.year)).fy===selFy;});
  if(selMo) data=data.filter(x=>x.month===selMo);
  const repMap={};
  function _addRep(name,type,reg,ups,plan){
    if(!name)return;
    if(!repMap[name])repMap[name]={type,reg:0,ups:0,regInc:0,upsInc:0};
    repMap[name].reg+=reg; repMap[name].ups+=ups;
    const custom=(reps.find(r=>r.name===name)||{}).custom_pct;
    const rRate=custom!==undefined?custom:(type==='AM'?plan.am_pct:plan.csm_pct);
    const uRate=custom!==undefined?custom:(type==='AM'?plan.am_upsell_pct:plan.csm_upsell_pct);
    repMap[name].regInc+=reg*rRate/100;
    repMap[name].upsInc+=ups*uRate/100;
  }
  data.forEach(x=>{
    const plan=getPlanForDate(x.collection_date);
    if(x.am_name!==undefined){
      _addRep(x.am_name,'AM',x.regular_amount||0,x.upsell_amount||0,plan);
      _addRep(x.csm_name,'CSM',x.regular_amount||0,x.upsell_amount||0,plan);
    } else if(x.regular_amount!==undefined){
      _addRep(x.rep_name,x.rep_type,x.regular_amount||0,x.upsell_amount||0,plan);
    } else {
      if((x.deal_type||'Regular')==='Upsell/Cross-sell') _addRep(x.rep_name,x.rep_type,0,x.amount||0,plan);
      else _addRep(x.rep_name,x.rep_type,x.amount||0,0,plan);
    }
  });
  const selTy=document.getElementById('i-ty')?.value||'';
  if(selTy) Object.keys(repMap).forEach(k=>{if(repMap[k].type!==selTy)delete repMap[k];});
  _incRows=Object.entries(repMap).map(([name,{type,reg,ups,regInc,upsInc}])=>{
    const custom=(reps.find(r=>r.name===name)||{}).custom_pct;
    const plan=getPlanForDate(null);
    const rRate=custom!==undefined?custom:(type==='AM'?plan.am_pct:plan.csm_pct);
    const uRate=custom!==undefined?custom:(type==='AM'?plan.am_upsell_pct:plan.csm_upsell_pct);
    return{name,type,reg,ups,rRate,uRate,regInc,upsInc,totalColl:reg+ups,totalInc:regInc+upsInc};
  }).sort((a,b)=>b.totalInc-a.totalInc);
  const rows=_incRows;
  const c=cfg(), amPct=c.am_pct||5, csmPct=c.csm_pct||3, amUp=c.am_upsell_pct||8, csmUp=c.csm_upsell_pct||6;
  const sumReg=rows.reduce((s,r)=>s+r.reg,0);
  const sumUps=rows.reduce((s,r)=>s+r.ups,0);
  const sumRegInc=rows.reduce((s,r)=>s+r.regInc,0);
  const sumUpsInc=rows.reduce((s,r)=>s+r.upsInc,0);
  document.getElementById('i-metrics').innerHTML=`
    ${mc('Regular Collected',inr(sumReg),'AM '+amPct+'% · CSM '+csmPct+'%',1)}
    ${mc('Upsell Collected',inr(sumUps),'AM '+amUp+'% · CSM '+csmUp+'%',3)}
    ${mc('Regular Incentive',inr(Math.round(sumRegInc)),'Earned on regular',0)}
    ${mc('Upsell Incentive',inr(Math.round(sumUpsInc)),'Earned on upsells',2)}
  `;
  document.getElementById('i-table').innerHTML=rows.length===0
    ? card(emptyState('No collections for this period. Import a CSV or add entries manually.'),'p-4')
    : `<div class="card overflow-hidden">
      <div class="overflow-x-auto">
      <table class="w-full text-sm dt min-w-[900px]">
        <thead class="bg-slate-50 border-b border-slate-100">${thRow(['Rep','Type','Regular Coll.','Rate','Regular Inc.','Upsell Coll.','Rate','Upsell Inc.','Total Incentive'])}</thead>
        <tbody class="divide-y divide-slate-50">
          ${rows.map(r=>`<tr>
            <td class="px-4 py-3 font-semibold text-slate-800">${r.name}</td>
            <td class="px-4 py-3">${typeBadge(r.type)}</td>
            <td class="px-4 py-3 text-slate-500">${r.reg>0?inr(r.reg):'—'}</td>
            <td class="px-4 py-3 text-xs" style="color:#818cf8">${r.rRate}%</td>
            <td class="px-4 py-3 font-semibold" style="color:#a5b4fc">${r.regInc>0?inr(Math.round(r.regInc)):'—'}</td>
            <td class="px-4 py-3 text-slate-500">${r.ups>0?inr(r.ups):'—'}</td>
            <td class="px-4 py-3 text-xs" style="color:#fbbf24">${r.uRate}%</td>
            <td class="px-4 py-3 font-semibold" style="color:#fcd34d">${r.upsInc>0?inr(Math.round(r.upsInc)):'—'}</td>
            <td class="px-4 py-3 font-bold text-emerald-600 text-base">${inr(Math.round(r.totalInc))}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot class="bg-slate-50 border-t border-slate-100"><tr>
          <td colspan="2" class="px-4 py-3 text-xs text-slate-400">${rows.length} rep${rows.length!==1?'s':''}</td>
          <td class="px-4 py-3 font-bold text-slate-700">${inr(sumReg)}</td><td></td>
          <td class="px-4 py-3 font-bold" style="color:#a5b4fc">${inr(Math.round(sumRegInc))}</td>
          <td class="px-4 py-3 font-bold text-slate-700">${inr(sumUps)}</td><td></td>
          <td class="px-4 py-3 font-bold" style="color:#fcd34d">${inr(Math.round(sumUpsInc))}</td>
          <td class="px-4 py-3 font-bold text-emerald-600">${inr(Math.round(sumRegInc+sumUpsInc))}</td>
        </tr></tfoot>
      </table>
      </div>
    </div>`;
  if(charts.i){charts.i.destroy();delete charts.i;}
  if(rows.length>0){
    charts.i=new Chart(document.getElementById('ch-i'),{
      type:'bar',
      data:{labels:rows.map(r=>r.name),datasets:[
        {label:'Regular Incentive',data:rows.map(r=>r.regInc),backgroundColor:'#6366f1',borderRadius:5,borderSkipped:false},
        {label:'Upsell Incentive',data:rows.map(r=>r.upsInc),backgroundColor:'#f59e0b',borderRadius:5,borderSkipped:false},
      ]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:12,font:{size:11}}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:compact},grid:{color:'rgba(255,255,255,0.06)'}}}},
    });
  }
}

function saveRates(){
  const c=cfg();
  c.am_pct=parseFloat(document.getElementById('s-am').value)||5;
  c.csm_pct=parseFloat(document.getElementById('s-csm').value)||3;
  c.am_upsell_pct=parseFloat(document.getElementById('s-am-up').value)||8;
  c.csm_upsell_pct=parseFloat(document.getElementById('s-csm-up').value)||6;
  setCfg(c); toast('Rates saved!'); go('settings');
}
function addRep(){
  const name=document.getElementById('s-rname').value.trim(), type=document.getElementById('s-rtype').value;
  const cust=document.getElementById('s-cust-chk').checked, cpct=parseFloat(document.getElementById('s-cpct')?.value);
  if(!name){alert('Name is required.');return;}
  const c=cfg(); c.reps=c.reps||[];
  if(c.reps.some(r=>r.name.toLowerCase()===name.toLowerCase())){alert('Rep already exists.');return;}
  const rep={name,type}; if(cust&&!isNaN(cpct))rep.custom_pct=cpct;
  c.reps.push(rep); setCfg(c); toast(`Added ${name} (${type})`); go('settings');
}
function delRep(name){
  if(!confirm(`Remove ${name}?`))return;
  const c=cfg(); c.reps=(c.reps||[]).filter(r=>r.name!==name);
  setCfg(c); toast(`Removed ${name}`); go('settings');
}
function clearImportLogs(){
  setImportLogs([]); toast('Import history cleared'); go('settings');
}
function savePlan(){
  const name=document.getElementById('pl-name').value.trim();
  const from=document.getElementById('pl-from').value;
  if(!name||!from){alert('Plan name and effective from date are required.');return;}
  const ps=plans();
  const p={
    id:uid(ps), name, effective_from:from,

function delPlan(id){

  ['opps','cols','accs','cfg','invs','csm_scores','import_logs','plans','targets'].forEach(k=>localStorage.removeItem(k));
  toast('All data cleared'); go('settings');
}
function exportBackup(){
  const data={
    _version:1, _exported:new Date().toISOString(), _app:'Travelling Salesman',
    accs:accs(), invs:invs(), opps:opps(), cols:cols(),
    cfg:cfg(), csm_scores:csmScores(), plans:plans(), targets:targets(),
  };
  const json=JSON.stringify(data,null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='ts-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('Backup downloaded!');
}
function importBackup(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data._app&&!data.accs&&!data.cols){alert('Invalid backup file.');return;}
        if(!confirm(`Restore backup from ${data._exported?new Date(data._exported).toLocaleString('en-IN'):'unknown date'}?\nThis will MERGE with existing data (not replace).`))return;
        function mergeArr(existing, incoming){
          const ids=new Set(existing.map(x=>x.id));
          return [...existing,...(incoming||[]).filter(x=>!ids.has(x.id))];
        }
        if(data.accs) setAccs(mergeArr(accs(),data.accs));
        if(data.invs) setInvs(mergeArr(invs(),data.invs));
        if(data.opps) setOpps(mergeArr(opps(),data.opps));
        if(data.cols) setCols(mergeArr(cols(),data.cols));
        if(data.plans) setPlans(mergeArr(plans(),data.plans));
        if(data.targets) setTargets(mergeArr(targets(),data.targets));
        if(data.csm_scores){
          const sc=csmScores();
          const merged=[...sc,...(data.csm_scores||[]).filter(s=>!sc.some(x=>x.csm_name===s.csm_name&&x.fy===s.fy&&x.quarter===s.quarter))];
          setCsmScores(merged);
        }
        toast('Backup restored (merged)!'); go('dashboard');
      }catch(err){alert('Failed to parse backup: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

    if(!b)return;

function renderTgtBody_(){
  const el=document.querySelector('[data-tgt-body]');
  if(el) el.innerHTML=renderTgtBody();
}
function renderTgtBody(){
  const selFy=document.getElementById('tgt-fy')?.value||window._selTgtFy||'';
  const selQ=window._selTgtQtr||'Q1';
  if(!selFy) return card(emptyState('Select a financial year.'),'p-4');
  const months=qtrToMonths(selFy,selQ);
  const mset=new Set(months.map(x=>x.m+'|'+x.y));
  const data=cols().filter(x=>mset.has(x.month+'|'+Number(x.year)));
  const amMap={},csmMap={};
  data.forEach(x=>{
    const reg=x.regular_amount||0,ups=x.upsell_amount||0;
    const amN=x.am_name||(x.rep_type==='AM'?x.rep_name:null);
    const csmN=x.csm_name||(x.rep_type==='CSM'?x.rep_name:null);
    if(amN){if(!amMap[amN])amMap[amN]={reg:0,ups:0};amMap[amN].reg+=reg;amMap[amN].ups+=ups;}
    if(csmN){if(!csmMap[csmN])csmMap[csmN]={reg:0,ups:0};csmMap[csmN].reg+=reg;csmMap[csmN].ups+=ups;}
  });
  const tgts=targets().filter(t=>t.fy===selFy&&t.quarter===selQ);
  function mkRow(name,type,collected){
    const tgt=tgts.find(t=>t.rep_name===name&&t.rep_type===type)||null;
    const tgtAmt=tgt?.target_amount||0;
    const pct=tgtAmt>0?Math.round(collected/tgtAmt*100):null;
    const threshAmt=tgt?(tgtAmt*(tgt.threshold_pct||0)/100):0;
    const gated=tgt&&threshAmt>0&&collected<threshAmt;
    const bar=pct!==null?`<div class="w-full h-1.5 rounded-full mt-1" style="background:rgba(255,255,255,0.1)"><div class="h-1.5 rounded-full" style="width:${Math.min(pct,100)}%;background:${pct>=100?'#10b981':pct>=70?'#f59e0b':'#ef4444'}"></div></div>`:'';
    return `<tr>
      <td class="px-4 py-3 font-semibold text-slate-800">${name}</td>
      <td class="px-4 py-3">${tgtAmt>0?inr(tgtAmt):'<span class="text-slate-500 text-xs">Not set</span>'}</td>
      <td class="px-4 py-3">${tgt?.threshold_pct?tgt.threshold_pct+'%':'—'}</td>
      <td class="px-4 py-3 font-semibold text-slate-800">${inr(collected)}</td>
      <td class="px-4 py-3">${pct!==null?`<span class="font-bold ${pct>=100?'text-emerald-400':pct>=70?'text-amber-400':'text-red-400'}">${pct}%</span>${bar}`:'—'}</td>
      <td class="px-4 py-3">${gated?'<span class="text-xs text-red-400 font-semibold">⚠ Below threshold</span>':pct!==null&&pct>=100?'<span class="text-xs text-emerald-400">✓ Target hit</span>':'<span class="text-xs text-slate-500">In progress</span>'}</td>
      <td class="px-4 py-3">${tgt?.accelerator_pct?tgt.accelerator_pct+'%':'—'}</td>
      <td class="px-4 py-3">${tgt?.cap_amount?inr(tgt.cap_amount):'—'}</td>
      <td class="px-4 py-3">
        <button onclick="editTarget(${tgt?tgt.id:'null'},'${name}','${type}')" class="text-blue-400 hover:underline text-xs mr-2">${tgt?'Edit':'Set'}</button>
        ${tgt?`<button onclick="delTarget(${tgt.id})" class="text-red-400 hover:underline text-xs">Del</button>`:''}
      </td>
    </tr>`;
  }
  const amRows=Object.entries(amMap).map(([name,{reg,ups}])=>mkRow(name,'AM',reg+ups));
  const csmRows=Object.entries(csmMap).map(([name,{reg,ups}])=>mkRow(name,'CSM',reg+ups));
  const noData=amRows.length===0&&csmRows.length===0;
  if(noData) return card(emptyState(`No collections found for ${selQ} ${selFy}. Import collections first.`),'p-4');
  const colHeader=thRow(['Rep','Target','Threshold %','Actual Collected','Attainment','Status','Accelerator %','Cap','']);
  return `
    ${amRows.length>0?`
    ${sectionHead('AM Targets','🎯')}
    <div class="card overflow-hidden mb-6"><div class="overflow-x-auto">
    <table class="w-full text-sm dt min-w-[900px]">
      <thead class="bg-slate-50 border-b border-slate-100">${colHeader}</thead>
      <tbody class="divide-y divide-slate-50">${amRows.join('')}</tbody>
    </table></div></div>`:''}
    ${csmRows.length>0?`
    ${sectionHead('CSM Targets','📊')}
    <div class="card overflow-hidden mb-6"><div class="overflow-x-auto">
    <table class="w-full text-sm dt min-w-[900px]">
      <thead class="bg-slate-50 border-b border-slate-100">${colHeader}</thead>
      <tbody class="divide-y divide-slate-50">${csmRows.join('')}</tbody>
    </table></div></div>`:''}
  `;
}

      ${frow(
        lbl('Financial Year *')+sel('tf-fy',[...allFys.map(f=>({v:f,l:f}))],tgt?.fy||window._selTgtFy||curFyq2.fy),
        lbl('Quarter *')+sel('tf-q',[{v:'Q1',l:'Q1'},{v:'Q2',l:'Q2'},{v:'Q3',l:'Q3'},{v:'Q4',l:'Q4'}],tgt?.quarter||window._selTgtQtr||'Q1')
      )}
      <div>${lbl('Collection Target (₹) *')}${inp('tf-tgt','number',tgt?.target_amount||'')}</div>
      <div class="grid grid-cols-3 gap-3">
        <div>${lbl('Threshold %')}<div class="text-[10px] text-slate-500 mb-1">Min % to earn any incentive</div>${inp('tf-thresh','number',tgt?.threshold_pct||'')}</div>
        <div>${lbl('Accelerator %')}<div class="text-[10px] text-slate-500 mb-1">Rate above 100% attainment</div>${inp('tf-accel','number',tgt?.accelerator_pct||'')}</div>
        <div>${lbl('Cap Amount (₹)')}<div class="text-[10px] text-slate-500 mb-1">Max incentive payout</div>${inp('tf-cap','number',tgt?.cap_amount||'')}</div>
      </div>
      <div class="flex gap-3 pt-2">
        <button onclick="saveTgtForm(${tgt?tgt.id:'null'})" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-2.5 rounded-xl text-sm font-semibold shadow">Save Target</button>
        <button onclick="go('targets')" class="px-4 py-2.5 border rounded-xl text-sm text-slate-400" style="border-color:rgba(255,255,255,0.1)">Cancel</button>
      </div>
    </div>
  </div>`;
}
function editTarget(id, repName, repType){
  document.getElementById('app').innerHTML=`
    ${pageHeader('Edit Target','','')}
    ${renderTgtForm(id==='null'?null:Number(id), repName, repType)}
  `;
}
function saveTgtForm(existingId){
  const repName=(document.getElementById('tf-rep').value||'').trim();
  const repType=document.getElementById('tf-type').value;
  const fy=document.getElementById('tf-fy').value;
  const quarter=document.getElementById('tf-q').value;
  const tgtAmt=parseFloat(document.getElementById('tf-tgt').value)||0;
  if(!repName||!fy||!quarter||tgtAmt<=0){alert('Rep name, FY, quarter and target amount are required.');return;}
  let ts=targets().filter(t=>!(t.rep_name===repName&&t.fy===fy&&t.quarter===quarter&&(!existingId||t.id!==existingId)));
  const thresh=parseFloat(document.getElementById('tf-thresh').value)||0;
  const accel=parseFloat(document.getElementById('tf-accel').value)||0;
  const cap=parseFloat(document.getElementById('tf-cap').value)||0;
  ts.push({
    id:existingId||uid(ts), rep_name:repName, rep_type:repType, fy, quarter,
    target_amount:tgtAmt,
    threshold_pct:thresh||null,
    accelerator_pct:accel||null,
    cap_amount:cap||null,
  });
  setTargets(ts); toast('Target saved!'); window._selTgtFy=fy; window._selTgtQtr=quarter; go('targets');
}
function delTarget(id){
  if(!confirm('Remove this target?'))return;
  setTargets(targets().filter(t=>t.id!==id)); toast('Target removed'); go('targets');
}

function migrateData(){
  // 1. Assign account_code to accounts missing one
  let allA=accs(), aChanged=false;
  allA.forEach(a=>{
    if(!a.account_code){
      const nums=allA.map(x=>{const m=x.account_code?.match(/(\d+)$/);return m?parseInt(m[1]):0;});
      const next=Math.max(0,...nums)+1;
      a.account_code='ACC-'+String(next).padStart(3,'0');
      aChanged=true;
    }
  });
  if(aChanged) setAccs(allA);
  // 2. Add account_id to opportunities matched by client_name
  let allO=opps(), oChanged=false;
  allO.forEach(o=>{if(!o.account_id){const acc=accs().find(a=>a.account_name===o.client_name);if(acc){o.account_id=acc.id;oChanged=true;}}});
  if(oChanged) setOpps(allO);
  // 3. Add account_id to collections matched by customer_name
  let allC=cols(), cChanged=false;
  allC.forEach(c=>{if(!c.account_id){const acc=accs().find(a=>a.account_name===c.customer_name);if(acc){c.account_id=acc.id;cChanged=true;}}});
  if(cChanged) setCols(allC);
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast'), ml=document.getElementById('toast-msg');
  ml.textContent=msg; el.classList.remove('hidden');
  clearTimeout(window._tt); window._tt=setTimeout(()=>el.classList.add('hidden'),2500);
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
migrateData();
go('dashboard');
</script>
